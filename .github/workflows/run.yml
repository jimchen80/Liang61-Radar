name: Liang61_Auto
on:
  schedule:
    - cron: '45 1 * * 1-5'  # 北京时间 09:45
    - cron: '15 2 * * 1-5'  # 北京时间 10:15
    - cron: '0 6 * * 1-5'   # 北京时间 14:00
    - cron: '45 6 * * 1-5'  # 北京时间 14:45
  workflow_dispatch:        # 允许手动运行
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Run
        run: |
          pip install -r requirements.txt
          python main.py
      - name: Upload Report
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
