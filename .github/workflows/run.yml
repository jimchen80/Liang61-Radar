name: Liang61_Iron_Radar

on:
  schedule:
    - cron: '45 1 * * 1-5'  # 09:45
    - cron: '15 2 * * 1-5'  # 10:15
    - cron: '0 6 * * 1-5'   # 14:00
    - cron: '45 6 * * 1-5'  # 14:45
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scan_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 开启缓存，加快扫描速度

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas requests jinja2 --upgrade

      - name: Execute Strategy
        run: python main.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          force_with_lease: true # 解决分支不存在或冲突的终极对策
